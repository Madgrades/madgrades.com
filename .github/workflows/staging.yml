name: Build and deploy to staging
on:
  push:
    branches: staging
  pull_request_review:
    types: [submitted]
    branches: staging
jobs:
  build:
    if: github.event_name == 'push' || github.event.review.state == 'approved'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@master
      - uses: actions/setup-node@v3
        with:
          node-version: 24
      - name: "Create env file"
        run: |
          echo "${{ secrets.ENV_FILE }}" > .env.original
          echo "=== Original env file ===" && cat .env.original
          # Add VITE_ prefix to variables that don't already have it (for Vite migration)
          # This handles lines like: MADGRADES_API=value -> VITE_MADGRADES_API=value
          # But keeps: VITE_URL=value -> VITE_URL=value
          # And skips: # comments, blank lines, PORT=3000
          awk '
            /^VITE_[A-Z_]+=/ { print; next }
            /^[A-Z_]+=[^#]/ && !/^PORT=/ { print "VITE_" $0; next }
            /^#/ || /^$/ { print; next }
            { print }
          ' .env.original > .env
          echo "=== Generated .env file ===" && cat .env
      - name: Install dependencies
        run: npm install
      - if: github.event_name == 'push'
        name: Deploy
        env:
          CI: false
          SURGE_LOGIN: "${{ secrets.SURGE_LOGIN }}"
          SURGE_TOKEN: "${{ secrets.SURGE_TOKEN }}"
        run: npm run deploy-staging
      - uses: actions/upload-artifact@v4
        with:
          name: build
          path: build
