name: Build and deploy to staging
on:
  push:
    branches: staging
  pull_request_review:
    types: [submitted]
    branches: staging
jobs:
  build:
    if: github.event_name == 'push' || github.event.review.state == 'approved'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@master
      - uses: actions/setup-node@v3
        with:
          node-version: 24
      - name: "Create env file"
        run: |
          echo "${{ secrets.ENV_FILE }}" > .env.original
          echo "=== Original env file (variable names only) ===" 
          grep "=" .env.original | cut -d'=' -f1 || echo "No variables found"
          # Transform old CRA variable names to Vite format:
          # REACT_APP_MADGRADES_API -> VITE_MADGRADES_API
          # MADGRADES_API -> VITE_MADGRADES_API  
          # VITE_URL -> VITE_URL (keep as is)
          # PORT=3000 -> PORT=3000 (keep as is)
          awk '
            # Already has VITE_ prefix - keep as is
            /^VITE_[A-Z_]+=/ { print; next }
            # Has REACT_APP_ prefix - strip it and add VITE_
            /^REACT_APP_[A-Z_]+=/ { sub(/^REACT_APP_/, "VITE_"); print; next }
            # Other env vars (but not PORT) - add VITE_ prefix
            /^[A-Z_]+=[^#]/ && !/^PORT=/ { print "VITE_" $0; next }
            # Comments and blank lines - keep as is
            /^#/ || /^$/ { print; next }
            # Everything else - keep as is
            { print }
          ' .env.original > .env
          echo "=== Generated .env file (variable names only) ===" 
          grep "=" .env | cut -d'=' -f1 || echo "No variables found"
      - name: Install dependencies
        run: npm install
      - if: github.event_name == 'push'
        name: Deploy
        env:
          CI: false
          SURGE_LOGIN: "${{ secrets.SURGE_LOGIN }}"
          SURGE_TOKEN: "${{ secrets.SURGE_TOKEN }}"
        run: npm run deploy-staging
      - uses: actions/upload-artifact@v4
        with:
          name: build
          path: build
